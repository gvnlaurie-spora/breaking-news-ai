name: Breaking News Pipeline

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours
  workflow_dispatch:         # Manual trigger from GitHub UI

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg espeak yt-dlp fonts-dejavu
          pip install edge-tts --break-system-packages

      - name: Install node deps
        run: cd backend && npm ci

      - name: Setup database
        run: |
          cd backend
          npx prisma generate
          npx prisma db push
        env:
          DATABASE_URL: file:./pipeline.db

      - name: Scrape clips
        run: cd backend && npm run scrape
        env:
          DATABASE_URL: file:./pipeline.db

      - name: Process articles with AI
        run: cd backend && npm run process-articles
        env:
          DATABASE_URL: file:./pipeline.db
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

      - name: Generate video
        run: cd backend && npm run generate-videos
        env:
          DATABASE_URL: file:./pipeline.db

      - name: Upload to YouTube
        run: cd backend && npm run upload-videos
        env:
          DATABASE_URL: file:./pipeline.db
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_REDIRECT_URI: http://localhost:3000/auth-callback
