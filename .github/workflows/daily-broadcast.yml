name: Breaking News AI — Daily Broadcast

on:
  schedule:
    - cron: '0 4 * * *'    # 06:00 SAST — Morning show
    - cron: '0 8 * * *'    # 10:00 SAST — Noon show
    - cron: '0 14 * * *'   # 16:00 SAST — Evening show
    - cron: '0 20 * * *'   # 22:00 SAST — Night show
  workflow_dispatch:
    inputs:
      show:
        description: 'Which show to run'
        type: choice
        required: true
        default: 'morning'
        options: [morning, noon, evening, night]

jobs:
  broadcast:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg espeak yt-dlp fonts-dejavu python3-pip
          pip install edge-tts --break-system-packages --quiet

      - name: Install Node dependencies
        working-directory: backend
        run: npm ci --quiet

      - name: Setup database
        working-directory: backend
        run: npx prisma generate && npx prisma db push
        env:
          DATABASE_URL: file:./pipeline.db

      - name: Determine show from schedule
        id: show
        run: |
          HOUR=$(date -u +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "id=${{ github.event.inputs.show }}" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "04" ]; then
            echo "id=morning" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "08" ]; then
            echo "id=noon" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "14" ]; then
            echo "id=evening" >> $GITHUB_OUTPUT
          else
            echo "id=night" >> $GITHUB_OUTPUT
          fi

      - name: Run show
        working-directory: backend
        timeout-minutes: 80
        env:
          DATABASE_URL: file:./pipeline.db
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_REDIRECT_URI: http://localhost:3000/auth-callback
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
        run: npx tsx src/scripts/build-news-show.ts --show=${{ steps.show.outputs.id }}

      - name: Upload video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ steps.show.outputs.id }}-${{ github.run_id }}
          path: backend/output/videos/*.mp4
          retention-days: 7
          if-no-files-found: ignore
