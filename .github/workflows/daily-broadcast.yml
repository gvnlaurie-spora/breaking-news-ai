name: 📺 Daily Breaking News Broadcast

on:
  schedule:
    - cron: '0 4 * * *'   # 06:00 SAST
    - cron: '0 8 * * *'   # 10:00 SAST
    - cron: '0 12 * * *'  # 14:00 SAST
    - cron: '0 16 * * *'  # 18:00 SAST
  workflow_dispatch:        # Manual trigger

jobs:
  broadcast:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1
      
      - name: Install edge-tts
        run: |
          pip install edge-tts --quiet
          edge-tts --version
      
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      
      - name: Build TypeScript
        working-directory: backend
        run: npm run build
      
      - name: Run news compilation
        working-directory: backend
        timeout-minutes: 45
        env:
          MAX_CLIPS: 8
          SEGMENT_DURATION: 180
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: npm run build-news
      
      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: broadcast-${{ github.run_id }}
          path: backend/output/videos/*.mp4
          retention-days: 7
      
      - name: Completion message
        run: |
          echo "✅ Broadcast completed at $(date)"
          echo "📹 Video saved as artifact"
